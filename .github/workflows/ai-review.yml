name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        id: review
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          use_sticky_comment: true
          prompt: |
            Review this pull request diff for a Cloudflare Workers + D1 student attendance app
            handling real student/parent data. Ignore all style, formatting, naming, and typo
            issues entirely -- that is a linter's job, not yours.

            Focus only on:
            - Business logic correctness (does the code do what it's supposed to do)
            - Security issues, especially SQL injection vectors and auth/access-control gaps
            - Unhandled edge cases (nulls, empty input, race conditions)
            - N+1 query patterns or other correctness-affecting performance issues

            For each issue found, cite the file and give a one-line fix suggestion. Post this as
            a PR comment.
          claude_args: |
            --model claude-sonnet-5
            --json-schema '{"type":"object","properties":{"has_critical_issues":{"type":"boolean","description":"true only for security bugs or business-logic bugs that would actually break the app in production, false for everything else including minor suggestions"}},"required":["has_critical_issues"]}'

      - name: Block merge on critical issues
        # continue-on-error above means a crashed/bailed run (e.g. Claude hit a
        # permission denial and never emitted structured_output) no longer hard-fails
        # this check by itself -- only a real has_critical_issues:true does. A bailed
        # run still posts whatever partial comment it managed, so it's visible, just
        # not merge-blocking -- re-run the job manually if you want a clean verdict.
        if: steps.review.outputs.structured_output != '' && fromJSON(steps.review.outputs.structured_output).has_critical_issues == true
        run: |
          echo "Critical issues found -- blocking merge."
          exit 1
